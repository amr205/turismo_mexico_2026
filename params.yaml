target:
  consumo: "consumo_turistico_interior_total"
  ivf: "ivf_turistico_total"

features:
  lags: [1, 2, 3, 4]
  rolling_windows: [2, 4]
  add_quarter_dummies: true
  add_trend: true
  train_start_date: "2018-01-01"   # null = toda la historia disponible; "2018-01-01" = solo desde indicadores
  indicators:
    aggregation: sum
    fill_missing: 0

model:
  type: xgboost

  xgboost:
    n_estimators: 100
    max_depth: 3
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    objective: "reg:squarederror"

  # lstm:
  #   hidden_size: 64
  #   num_layers: 2
  #   epochs: 100
  #   learning_rate: 0.001
  #   sequence_length: 8

train:
  test_size: 0.2
  random_state: 42

evaluate:
  forecast_horizon: 8

interpret:
  stl_period: 4
  shap_max_display: 10
  save_shap_values: true

ivf_multi:
  ivf_total_nacional:
    target: "ivf_total_nacional"
  ivf_turistico_total:
    target: "ivf_turistico_total"
  ivf_turistico_bienes:
    target: "ivf_turistico_bienes"
  ivf_turistico_servicios:
    target: "ivf_turistico_servicios"

forecast:
  horizon: 5
  future_indicator_method: "same_quarter_prior_year"

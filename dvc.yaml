stages:

  clean_consumo:
    cmd: python src/clean_file_consumo_turistico.py
    deps:
      - src/clean_file_consumo_turistico.py
      - data/raw/consumo_turistico_inegi.csv
    outs:
      - data/processed/consumo_turistico_inegi_clean.csv:
          cache: false

  clean_ivf:
    cmd: python src/clean_file_indice_volumen_fisico.py
    deps:
      - src/clean_file_indice_volumen_fisico.py
      - data/raw/indice_volumen_fisico_inegi.csv
    outs:
      - data/processed/indice_volumen_fisico_inegi_clean.csv:
          cache: false

  clean_indicadores:
    cmd: python src/clean_turismo_indicadores.py
    deps:
      - src/clean_turismo_indicadores.py
      - data/raw/turismo_indicadores_inegi.csv
    outs:
      - data/processed/turismo_indicadores_inegi_clean.csv:
          cache: false

  plot_timeseries:
    cmd: python src/plot_timeseries.py
    deps:
      - src/plot_timeseries.py
      - data/processed/consumo_turistico_inegi_clean.csv
      - data/processed/indice_volumen_fisico_inegi_clean.csv
    outs:
      - plots/consumo_turistico.png:
          cache: false
      - plots/ivf_turismo.png:
          cache: false

  features_consumo:
    cmd: python src/features.py --dataset consumo
    deps:
      - src/features.py
      - data/processed/consumo_turistico_inegi_clean.csv
      - params.yaml
    params:
      - target.consumo
      - features
    outs:
      - data/features/features_consumo.csv:
          cache: false

  features_ivf:
    cmd: python src/features.py --dataset ivf
    deps:
      - src/features.py
      - data/processed/indice_volumen_fisico_inegi_clean.csv
      - params.yaml
    params:
      - target.ivf
      - features
    outs:
      - data/features/features_ivf.csv:
          cache: false

  train_consumo:
    cmd: python src/train.py --dataset consumo
    deps:
      - src/train.py
      - src/models/__init__.py
      - src/models/xgboost_model.py
      - src/models/mlp_model.py
      - src/models/gru_model.py
      - src/models/cnn_gru_model.py
      - src/models/res_cnn_gru_model.py
      - data/features/features_consumo.csv
      - params.yaml
    params:
      - target.consumo
      - model
      - train
    outs:
      - models/split_consumo.json:
          cache: false
      - models/xgboost_consumo.json:
          cache: false

  train_ivf:
    cmd: python src/train.py --dataset ivf
    deps:
      - src/train.py
      - src/models/__init__.py
      - src/models/xgboost_model.py
      - src/models/mlp_model.py
      - src/models/gru_model.py
      - src/models/cnn_gru_model.py
      - src/models/res_cnn_gru_model.py
      - data/features/features_ivf.csv
      - params.yaml
    params:
      - target.ivf
      - model
      - train
    outs:
      - models/split_ivf.json:
          cache: false
      - models/xgboost_ivf.json:
          cache: false

  evaluate_consumo:
    cmd: python src/evaluate.py --dataset consumo
    deps:
      - src/evaluate.py
      - src/models/__init__.py
      - src/models/xgboost_model.py
      - src/models/mlp_model.py
      - src/models/gru_model.py
      - src/models/cnn_gru_model.py
      - src/models/res_cnn_gru_model.py
      - data/features/features_consumo.csv
      - models/xgboost_consumo.json
      - models/split_consumo.json
      - params.yaml
    params:
      - target.consumo
      - model.type
      - evaluate
    metrics:
      - metrics/metrics_consumo.json:
          cache: false
    plots:
      - plots/forecast_consumo.png:
          cache: false

  evaluate_ivf:
    cmd: python src/evaluate.py --dataset ivf
    deps:
      - src/evaluate.py
      - src/models/__init__.py
      - src/models/xgboost_model.py
      - src/models/mlp_model.py
      - src/models/gru_model.py
      - src/models/cnn_gru_model.py
      - src/models/res_cnn_gru_model.py
      - data/features/features_ivf.csv
      - models/xgboost_ivf.json
      - models/split_ivf.json
      - params.yaml
    params:
      - target.ivf
      - model.type
      - evaluate
    metrics:
      - metrics/metrics_ivf.json:
          cache: false
    plots:
      - plots/forecast_ivf.png:
          cache: false

  interpret_consumo:
    cmd: python src/interpret.py --dataset consumo
    deps:
      - src/interpret.py
      - src/models/__init__.py
      - src/models/xgboost_model.py
      - src/models/mlp_model.py
      - src/models/gru_model.py
      - src/models/cnn_gru_model.py
      - src/models/res_cnn_gru_model.py
      - data/features/features_consumo.csv
      - data/processed/consumo_turistico_inegi_clean.csv
      - models/xgboost_consumo.json
      - models/split_consumo.json
      - params.yaml
    params:
      - target.consumo
      - model.type
      - interpret
    plots:
      - plots/shap_consumo.png:
          cache: false
      - plots/stl_consumo.png:
          cache: false

  interpret_ivf:
    cmd: python src/interpret.py --dataset ivf
    deps:
      - src/interpret.py
      - src/models/__init__.py
      - src/models/xgboost_model.py
      - src/models/mlp_model.py
      - src/models/gru_model.py
      - src/models/cnn_gru_model.py
      - src/models/res_cnn_gru_model.py
      - data/features/features_ivf.csv
      - data/processed/indice_volumen_fisico_inegi_clean.csv
      - models/xgboost_ivf.json
      - models/split_ivf.json
      - params.yaml
    params:
      - target.ivf
      - model.type
      - interpret
    plots:
      - plots/shap_ivf.png:
          cache: false
      - plots/stl_ivf.png:
          cache: false

  # ── Nuevas series IVF con indicadores externos ──────────────────────────────

  backcast_indicadores:
    cmd: python src/backcast_indicadores.py
    deps:
      - src/backcast_indicadores.py
      - data/processed/turismo_indicadores_inegi_clean.csv
      - data/processed/indice_volumen_fisico_inegi_clean.csv
      - params.yaml
    params:
      - features.indicators
    outs:
      - data/processed/indicadores_backcasted.csv:
          cache: false

  features_ivf_multi:
    foreach:
      - ivf_total_nacional
      - ivf_turistico_total
      - ivf_turistico_bienes
      - ivf_turistico_servicios
    do:
      cmd: python src/features_ivf_multi.py --series ${item}
      deps:
        - src/features_ivf_multi.py
        - data/processed/indice_volumen_fisico_inegi_clean.csv
        - data/processed/indicadores_backcasted.csv
        - params.yaml
      params:
        - features
        - ivf_multi.${item}
      outs:
        - data/features/features_${item}.csv:
            cache: false

  train_ivf_multi:
    foreach:
      - ivf_total_nacional
      - ivf_turistico_total
      - ivf_turistico_bienes
      - ivf_turistico_servicios
    do:
      cmd: python src/train.py --dataset ${item}
      deps:
        - src/train.py
        - src/models/__init__.py
        - src/models/xgboost_model.py
        - src/models/mlp_model.py
        - src/models/gru_model.py
        - src/models/cnn_gru_model.py
        - src/models/res_cnn_gru_model.py
        - data/features/features_${item}.csv
        - params.yaml
      params:
        - ivf_multi.${item}
        - model
        - train
      outs:
        - models/split_${item}.json:
            cache: false
        - models/xgboost_${item}.json:
            cache: false

  evaluate_ivf_multi:
    foreach:
      - ivf_total_nacional
      - ivf_turistico_total
      - ivf_turistico_bienes
      - ivf_turistico_servicios
    do:
      cmd: python src/evaluate.py --dataset ${item}
      deps:
        - src/evaluate.py
        - src/models/__init__.py
        - src/models/xgboost_model.py
        - src/models/mlp_model.py
        - src/models/gru_model.py
        - src/models/cnn_gru_model.py
        - src/models/res_cnn_gru_model.py
        - data/features/features_${item}.csv
        - models/xgboost_${item}.json
        - models/split_${item}.json
        - params.yaml
      params:
        - ivf_multi.${item}
        - model.type
        - evaluate
      metrics:
        - metrics/metrics_${item}.json:
            cache: false
      plots:
        - plots/forecast_${item}.png:
            cache: false

  interpret_ivf_multi:
    foreach:
      - ivf_total_nacional
      - ivf_turistico_total
      - ivf_turistico_bienes
      - ivf_turistico_servicios
    do:
      cmd: python src/interpret.py --dataset ${item}
      deps:
        - src/interpret.py
        - src/models/__init__.py
        - src/models/xgboost_model.py
        - src/models/mlp_model.py
        - src/models/gru_model.py
        - src/models/cnn_gru_model.py
        - src/models/res_cnn_gru_model.py
        - data/features/features_${item}.csv
        - data/processed/indice_volumen_fisico_inegi_clean.csv
        - models/xgboost_${item}.json
        - models/split_${item}.json
        - params.yaml
      params:
        - ivf_multi.${item}
        - model.type
        - interpret
      plots:
        - plots/shap_${item}.png:
            cache: false
        - plots/stl_${item}.png:
            cache: false
      outs:
        - data/shap/shap_values_${item}.npz:
            cache: false
        - data/shap/feature_names_${item}.json:
            cache: false

  forecast_ivf_multi:
    foreach:
      - ivf_total_nacional
      - ivf_turistico_total
      - ivf_turistico_bienes
      - ivf_turistico_servicios
    do:
      cmd: python src/forecast.py --series ${item}
      deps:
        - src/forecast.py
        - data/features/features_${item}.csv
        - models/xgboost_${item}.json
        - models/split_${item}.json
        - data/processed/indicadores_backcasted.csv
        - params.yaml
      params:
        - ivf_multi.${item}
        - forecast
        - features
      outs:
        - data/forecasts/forecast_${item}.csv:
            cache: false
        - plots/forecast_future_${item}.png:
            cache: false

  plot_ivf_overview:
    cmd: python src/plot_ivf_overview.py
    deps:
      - src/plot_ivf_overview.py
      - data/processed/indice_volumen_fisico_inegi_clean.csv
    outs:
      - plots/general/ivf_overview.png:
          cache: false

  compare_shap:
    cmd: python src/compare_shap.py
    deps:
      - src/compare_shap.py
      - data/shap/shap_values_ivf_total_nacional.npz
      - data/shap/shap_values_ivf_turistico_total.npz
      - data/shap/shap_values_ivf_turistico_bienes.npz
      - data/shap/shap_values_ivf_turistico_servicios.npz
      - data/shap/feature_names_ivf_total_nacional.json
      - data/shap/feature_names_ivf_turistico_total.json
      - data/shap/feature_names_ivf_turistico_bienes.json
      - data/shap/feature_names_ivf_turistico_servicios.json
      - params.yaml
    plots:
      - plots/shap_compare_indicators.png:
          cache: false
    outs:
      - data/shap/indicator_importance_summary.csv:
          cache: false
